services:
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: spygym-backend
    volumes:
      - spygym_data:/app/backend/data
    env_file:
      - ../backend/.env
    environment:
      SPYGYM_ENV: production
      SPYGYM_HOST: 0.0.0.0
      SPYGYM_PORT: 8000
      SPYGYM_AUTO_SEED_DEMO: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
    container_name: spygym-nginx
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  spygym_data:
