version: "3.9"

services:
  backend:
    image: python:3.13-slim
    container_name: spygym-backend
    working_dir: /app/backend
    volumes:
      - ../backend:/app/backend
      - spygym_data:/app/backend/data
    environment:
      SPYGYM_ENV: production
      SPYGYM_HOST: 0.0.0.0
      SPYGYM_PORT: 8000
      SPYGYM_SECRET_SEED: altere-esta-chave-agora
      SPYGYM_ALLOWED_ORIGINS: http://191.252.212.6
      SPYGYM_ALLOWED_HOSTS: 191.252.212.6,localhost,127.0.0.1
      SPYGYM_AUTO_SEED_DEMO: "false"
      SPYGYM_ADMIN_NAME: Administrador SPYGYM
      SPYGYM_ADMIN_EMAIL: admin@spygym.local
      SPYGYM_ADMIN_PASSWORD: altere-esta-senha-agora
    command: >
      sh -c "
      pip install --no-cache-dir -r requirements.txt &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: spygym-frontend-build
    working_dir: /app/frontend
    volumes:
      - ../frontend:/app/frontend
      - frontend_dist:/dist
    command: >
      sh -c "
      npm install &&
      npm run build &&
      cp -r dist/. /dist
      "

  nginx:
    image: nginx:stable-alpine
    container_name: spygym-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.spygym.ip.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  spygym_data:
  frontend_dist:
