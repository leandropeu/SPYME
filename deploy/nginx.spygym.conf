server {
  listen 80;
  server_name spygym.seudominio.com;

  client_max_body_size 20m;

  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /ws {
    proxy_pass http://backend:8000/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
  }

  # Para vender como solucao SaaS:
  # 1. Coloque HTTPS via certbot, Caddy ou proxy do provedor.
  # 2. Restrinja IPs administrativos ou use VPN para acesso ao backend.
  # 3. Considere migrar de SQLite para Postgres se houver multiempresa pesada.
}
